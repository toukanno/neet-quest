<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ニートクエスト</title>
  <style>
    :root {
      --bg: #f3efe3;
      --panel: rgba(255, 250, 240, 0.92);
      --ink: #1f2933;
      --muted: #52606d;
      --accent: #c05621;
      --accent-strong: #9c4221;
      --accent-soft: #fbd38d;
      --success: #2f855a;
      --danger: #c53030;
      --shadow: 0 18px 45px rgba(61, 43, 17, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(251, 211, 141, 0.55), transparent 40%),
        linear-gradient(160deg, #f4efe2 0%, #e6dcc7 45%, #d2c2a8 100%);
      padding: 24px;
    }

    .shell {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid rgba(140, 102, 57, 0.18);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 28px;
      display: grid;
      gap: 14px;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(192, 86, 33, 0.1);
      color: var(--accent-strong);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 4.5rem);
      line-height: 1.05;
      letter-spacing: 0.04em;
    }

    .lead {
      margin: 0;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 1rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid rgba(140, 102, 57, 0.16);
    }

    .stat-card span {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.06em;
    }

    .stat-card strong {
      font-size: 1.6rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
    }

    .panel {
      padding: 22px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 1.3rem;
    }

    .status-line {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.7;
      min-height: 3.4em;
    }

    .meter-group {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .meter label {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 6px;
      color: var(--muted);
    }

    .bar {
      height: 12px;
      background: rgba(31, 41, 51, 0.1);
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0;
      border-radius: 999px;
      transition: width 220ms ease;
    }

    .fill.hp {
      background: linear-gradient(90deg, #f56565 0%, #c53030 100%);
    }

    .fill.energy {
      background: linear-gradient(90deg, #ed8936 0%, #c05621 100%);
    }

    .fill.progress {
      background: linear-gradient(90deg, #68d391 0%, #2f855a 100%);
    }

    .fill.boss {
      background: linear-gradient(90deg, #718096 0%, #2d3748 100%);
    }

    .scene {
      padding: 16px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(247, 240, 224, 0.82)),
        repeating-linear-gradient(
          -45deg,
          rgba(192, 86, 33, 0.04),
          rgba(192, 86, 33, 0.04) 10px,
          transparent 10px,
          transparent 20px
        );
      border: 1px solid rgba(140, 102, 57, 0.16);
      margin-bottom: 18px;
    }

    .scene strong {
      font-size: 1.1rem;
    }

    .choices,
    .meta-actions {
      display: grid;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(61, 43, 17, 0.14);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .choice {
      background: #fffdf8;
      border: 1px solid rgba(140, 102, 57, 0.14);
    }

    .choice strong,
    .choice span {
      display: block;
    }

    .choice span {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .secondary {
      background: rgba(192, 86, 33, 0.11);
      color: var(--accent-strong);
    }

    .primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      color: #fff7ed;
      text-align: center;
      font-weight: 700;
    }

    .journal {
      display: grid;
      gap: 10px;
      max-height: 420px;
      overflow: auto;
      padding-right: 6px;
    }

    .entry {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(140, 102, 57, 0.12);
      line-height: 1.65;
      color: var(--muted);
    }

    .entry strong {
      color: var(--ink);
    }

    .ending {
      padding: 16px;
      border-radius: 18px;
      background: rgba(104, 211, 145, 0.12);
      border: 1px solid rgba(47, 133, 90, 0.18);
      line-height: 1.8;
      color: var(--ink);
    }

    .help {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.7;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 14px;
      }

      .hero,
      .panel {
        padding: 18px;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-top">
        <div>
          <div class="kicker">再就職ファンタジー RPG</div>
          <h1>ニートクエスト</h1>
        </div>
        <button class="secondary" id="restartButton" type="button">最初からやり直す</button>
      </div>
      <p class="lead">
        引きこもり歴 3 年。勇者の素質はあるが、履歴書は白紙。
        生活力・メンタル・面接力を鍛えながら、魔王「無職永続化」を倒して社会復帰を目指す短編RPGです。
      </p>
      <div class="stats">
        <div class="stat-card"><span>日数</span><strong id="dayValue">1日目</strong></div>
        <div class="stat-card"><span>所持金</span><strong id="goldValue">0G</strong></div>
        <div class="stat-card"><span>称号</span><strong id="titleValue">部屋の守護者</strong></div>
        <div class="stat-card"><span>現在地</span><strong id="locationValue">自室</strong></div>
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <h2>現在の行動</h2>
        <p class="status-line" id="statusLine"></p>

        <div class="meter-group">
          <div class="meter">
            <label><span>体力</span><strong id="hpLabel">0 / 0</strong></label>
            <div class="bar"><div class="fill hp" id="hpBar"></div></div>
          </div>
          <div class="meter">
            <label><span>気力</span><strong id="energyLabel">0 / 0</strong></label>
            <div class="bar"><div class="fill energy" id="energyBar"></div></div>
          </div>
          <div class="meter">
            <label><span>社会復帰ゲージ</span><strong id="progressLabel">0 / 100</strong></label>
            <div class="bar"><div class="fill progress" id="progressBar"></div></div>
          </div>
          <div class="meter">
            <label><span>魔王の耐久</span><strong id="bossLabel">0 / 0</strong></label>
            <div class="bar"><div class="fill boss" id="bossBar"></div></div>
          </div>
        </div>

        <div class="scene">
          <strong id="sceneTitle"></strong>
          <p class="help" id="sceneText"></p>
        </div>

        <div class="choices" id="choices"></div>
        <div class="meta-actions" id="metaActions"></div>
      </div>

      <aside class="panel">
        <h2>冒険ログ</h2>
        <div class="journal" id="journal"></div>
        <div class="ending" id="endingBox" hidden></div>
      </aside>
    </section>
  </main>

  <script>
    const maxStats = {
      hp: 100,
      energy: 100,
      progress: 100,
      bossHp: 180
    };

    const state = {};

    const scenarios = {
      room: {
        title: "自室のターン",
        text: "布団の結界は強い。だが行動すれば、経験値は必ず積み上がる。",
        location: "自室",
        options: [
          {
            label: "布団をたたむ",
            detail: "小さな生活改善。気力を回復し、進捗を少し伸ばす。",
            apply() {
              updateState({ day: 1, energy: 12, progress: 6, gold: 0, hp: 4 });
              addLog("布団をたたみ、生活導線を確保。小さな勝利で気力が戻った。");
              setScene("hall");
            }
          },
          {
            label: "求人票を 3 件読む",
            detail: "情報収集。進捗は大きいが、少し消耗する。",
            apply() {
              updateState({ day: 1, energy: -8, progress: 14, hp: -3 });
              addLog("求人票を読み、敵の生態を把握した。知らない単語は多いが前進。");
              setScene("town");
            }
          },
          {
            label: "ゲーム配信を見て現実逃避",
            detail: "一時的には楽だが、魔王が勢いづく。",
            apply() {
              updateState({ day: 1, energy: 6, progress: -6, bossHp: 8 });
              addLog("現実逃避は甘い霧。気力は少し戻るが、社会復帰ゲージが後退した。");
              setScene("room");
            }
          }
        ]
      },
      hall: {
        title: "玄関前イベント",
        text: "外に出るには決意がいる。靴を履くか、もう一周悩むか。",
        location: "玄関",
        options: [
          {
            label: "コンビニへ行く",
            detail: "短距離クエスト。社会性と所持金を少し得る。",
            apply() {
              updateState({ day: 1, energy: -10, hp: -4, gold: 180, progress: 10 });
              addLog("コンビニ店員との『袋いりますか』を乗り越えた。対人耐性が上がる。");
              setScene("town");
            }
          },
          {
            label: "役所の就労相談を予約する",
            detail: "かなり進むが、精神力を使う。",
            apply() {
              updateState({ day: 1, energy: -16, progress: 18, hp: -6 });
              addLog("就労相談を予約。電話一本で精神ダメージは大きいが、未来が開ける。");
              setScene("office");
            }
          },
          {
            label: "玄関で深呼吸して戻る",
            detail: "安全策。体力は戻るが、進行は遅い。",
            apply() {
              updateState({ day: 1, hp: 10, energy: 4, progress: 2 });
              addLog("撤退ではなく準備だと言い聞かせた。明日への布石。");
              setScene("room");
            }
          }
        ]
      },
      town: {
        title: "街クエスト",
        text: "街には経験値が落ちている。ただし気力を削る雑魚敵も多い。",
        location: "商店街",
        options: [
          {
            label: "図書館で履歴書の書き方を調べる",
            detail: "安定行動。進捗と気力の両方に効く。",
            apply() {
              updateState({ day: 1, energy: 8, progress: 16, hp: 2 });
              addLog("履歴書の基本を学んだ。『空白期間』にも説明の仕方があると知る。");
              setScene("office");
            }
          },
          {
            label: "単発バイトに応募する",
            detail: "所持金と進捗が増えるが、消耗は大きい。",
            apply() {
              updateState({ day: 2, energy: -20, hp: -14, gold: 1200, progress: 22 });
              addLog("単発バイトを完遂。レジ横の戦場を生き残り、社会復帰の手応えを得た。");
              setScene("camp");
            }
          },
          {
            label: "公園で人間観察する",
            detail: "低リスクで少し回復。ログも増える。",
            apply() {
              updateState({ day: 1, hp: 6, energy: 10, progress: 5 });
              addLog("ベンチで観察。世の中の人は意外と普通に生きていると知って安心した。");
              setScene("camp");
            }
          }
        ]
      },
      office: {
        title: "就労支援ギルド",
        text: "相談員は味方だ。ここで装備を整えれば、面接戦に備えられる。",
        location: "支援ギルド",
        options: [
          {
            label: "履歴書を添削してもらう",
            detail: "進捗大。称号も変わりやすい。",
            apply() {
              updateState({ day: 1, energy: -12, progress: 20, hp: -2 });
              state.title = "履歴書の見習い勇者";
              addLog("添削完了。読める文章になっただけで、世界が少し味方に見えた。");
              setScene("camp");
            }
          },
          {
            label: "模擬面接を受ける",
            detail: "ボス戦の下準備。大きく削られるが強い。",
            apply() {
              updateState({ day: 1, energy: -18, hp: -10, progress: 24, bossHp: -18 });
              state.title = "受け答えの剣士";
              addLog("模擬面接で敗北しつつも学んだ。沈黙の長さは短くなっている。");
              setScene("camp");
            }
          },
          {
            label: "職員に現状を正直に話す",
            detail: "回復寄り。大きな前進ではないが崩れにくい。",
            apply() {
              updateState({ day: 1, energy: 14, hp: 12, progress: 10, bossHp: -8 });
              addLog("正直に話したことで、無理のないルートが見えた。");
              setScene("camp");
            }
          }
        ]
      },
      camp: {
        title: "準備フェーズ",
        text: "応募するか、休むか、鍛えるか。ここでの判断が終盤を左右する。",
        location: "拠点",
        options: [
          {
            label: "温かい飯を食べて休む",
            detail: "体力と気力を大きく回復。所持金を使う。",
            apply() {
              updateState({ day: 1, hp: 22, energy: 24, gold: -350, progress: 4 });
              addLog("食事と睡眠を確保。回復は戦略であり甘えではない。");
              setScene("camp");
            }
          },
          {
            label: "応募書類を送る",
            detail: "社会復帰ゲージを大きく伸ばし、魔王も削る。",
            apply() {
              updateState({ day: 1, energy: -14, hp: -6, progress: 26, bossHp: -24 });
              addLog("応募完了。送信ボタンを押す手は震えたが、確かに世界へ矢を放った。");
              if (state.progress >= 70) {
                setScene("boss");
              } else {
                setScene("camp");
              }
            }
          },
          {
            label: "身だしなみを整えて写真を撮る",
            detail: "進捗と称号に効く。終盤への橋渡し。",
            apply() {
              updateState({ day: 1, energy: -8, hp: -4, progress: 16, bossHp: -10 });
              state.title = "第一印象の騎士";
              addLog("証明写真を更新。画面の中の自分が少しだけ信頼できる顔になった。");
              setScene("boss");
            }
          }
        ]
      },
      boss: {
        title: "最終面接: 魔王『無職永続化』",
        text: "魔王は囁く。『今さら無理だ』。ここまでの積み重ねで、その声を上書きしろ。",
        location: "面接会場",
        options: [
          {
            label: "自己分析の剣で斬る",
            detail: "進捗が高いほど大ダメージ。気力を使う。",
            apply() {
              const strike = 22 + Math.floor(state.progress / 5);
              updateState({ day: 1, energy: -14, hp: -8, bossHp: -strike, progress: 6 });
              addLog("自己分析の剣が刺さる。過去を言葉にできるほど、魔王の霧は薄れる。");
              resolveBossTurn();
            }
          },
          {
            label: "模擬面接の盾で受け切る",
            detail: "安全重視。回復しつつ削る。",
            apply() {
              updateState({ day: 1, energy: -6, hp: 6, bossHp: -16, progress: 4 });
              addLog("落ち着いて受け答え。完璧ではないが、崩れないことが強い。");
              resolveBossTurn();
            }
          },
          {
            label: "志望動機の奥義を放つ",
            detail: "ハイリスク高火力。気力が足りないと失敗する。",
            apply() {
              if (state.energy < 28) {
                updateState({ day: 1, hp: -14, energy: -8, bossHp: 6 });
                addLog("言葉が空回りした。準備不足の奥義は隙になる。");
              } else {
                updateState({ day: 1, hp: -10, energy: -24, bossHp: -40, progress: 10 });
                addLog("志望動機が通った。熱量が論理を伴い、魔王の核心を貫く。");
              }
              resolveBossTurn();
            }
          }
        ]
      }
    };

    const ui = {
      dayValue: document.getElementById("dayValue"),
      goldValue: document.getElementById("goldValue"),
      titleValue: document.getElementById("titleValue"),
      locationValue: document.getElementById("locationValue"),
      statusLine: document.getElementById("statusLine"),
      hpLabel: document.getElementById("hpLabel"),
      energyLabel: document.getElementById("energyLabel"),
      progressLabel: document.getElementById("progressLabel"),
      bossLabel: document.getElementById("bossLabel"),
      hpBar: document.getElementById("hpBar"),
      energyBar: document.getElementById("energyBar"),
      progressBar: document.getElementById("progressBar"),
      bossBar: document.getElementById("bossBar"),
      sceneTitle: document.getElementById("sceneTitle"),
      sceneText: document.getElementById("sceneText"),
      choices: document.getElementById("choices"),
      metaActions: document.getElementById("metaActions"),
      journal: document.getElementById("journal"),
      endingBox: document.getElementById("endingBox"),
      restartButton: document.getElementById("restartButton")
    };

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function updateState(delta) {
      state.day += delta.day || 0;
      state.gold = Math.max(0, state.gold + (delta.gold || 0));
      state.hp = clamp(state.hp + (delta.hp || 0), 0, maxStats.hp);
      state.energy = clamp(state.energy + (delta.energy || 0), 0, maxStats.energy);
      state.progress = clamp(state.progress + (delta.progress || 0), 0, maxStats.progress);
      state.bossHp = clamp(state.bossHp + (delta.bossHp || 0), 0, maxStats.bossHp);
    }

    function addLog(message) {
      state.log.unshift({
        day: state.day,
        message
      });
    }

    function setScene(key) {
      state.scene = key;
      render();
    }

    function resolveBossTurn() {
      if (state.bossHp <= 0 || state.progress >= 100) {
        winGame();
        return;
      }

      const retaliation = Math.max(8, 20 - Math.floor(state.progress / 10));
      updateState({ hp: -retaliation, energy: -6 });
      addLog("魔王『無職永続化』が反撃。『まだ準備が足りない』という声が胸を刺した。");

      if (state.hp <= 0 || state.energy <= 0) {
        loseGame();
        return;
      }

      setScene("boss");
    }

    function winGame() {
      state.ended = true;
      state.win = true;
      state.title = "社会復帰の勇者";
      state.scene = "boss";
      addLog("最終面接を突破。無職永続化は崩れ、次の朝に向かう道が開いた。");
      render();
    }

    function loseGame() {
      state.ended = true;
      state.win = false;
      state.scene = "camp";
      addLog("力尽きた。しかし敗北ログは次周回の攻略本になる。");
      render();
    }

    function createChoice(option) {
      const button = document.createElement("button");
      button.className = "choice";
      button.type = "button";
      button.innerHTML = "<strong>" + option.label + "</strong><span>" + option.detail + "</span>";
      button.disabled = state.ended;
      button.addEventListener("click", option.apply);
      return button;
    }

    function createMetaButton(label, detail, handler, primary) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = primary ? "primary" : "secondary";
      button.innerHTML = primary ? label : "<strong>" + label + "</strong><span>" + detail + "</span>";
      button.addEventListener("click", handler);
      return button;
    }

    function renderJournal() {
      ui.journal.innerHTML = "";
      state.log.slice(0, 10).forEach((entry) => {
        const item = document.createElement("div");
        item.className = "entry";
        item.innerHTML = "<strong>" + entry.day + "日目</strong><br>" + entry.message;
        ui.journal.appendChild(item);
      });
    }

    function renderBars() {
      ui.hpLabel.textContent = state.hp + " / " + maxStats.hp;
      ui.energyLabel.textContent = state.energy + " / " + maxStats.energy;
      ui.progressLabel.textContent = state.progress + " / " + maxStats.progress;
      ui.bossLabel.textContent = state.bossHp + " / " + maxStats.bossHp;
      ui.hpBar.style.width = (state.hp / maxStats.hp) * 100 + "%";
      ui.energyBar.style.width = (state.energy / maxStats.energy) * 100 + "%";
      ui.progressBar.style.width = (state.progress / maxStats.progress) * 100 + "%";
      ui.bossBar.style.width = (state.bossHp / maxStats.bossHp) * 100 + "%";
    }

    function renderEnding() {
      if (!state.ended) {
        ui.endingBox.hidden = true;
        ui.endingBox.textContent = "";
        return;
      }

      ui.endingBox.hidden = false;
      if (state.win) {
        ui.endingBox.innerHTML =
          "<strong>エンディング: 再出発</strong><br>" +
          "あなたは魔王を倒し、就業への扉を開いた。完璧ではなくても、生活を立て直し、助けを使い、応募を続けたことが勝因だ。";
      } else {
        ui.endingBox.innerHTML =
          "<strong>バッドエンド: 次周回へ</strong><br>" +
          "今回は倒れたが、ログは残る。休養と準備の配分を変えれば、次はもっと先まで行ける。";
      }
    }

    function render() {
      const scene = scenarios[state.scene];
      ui.dayValue.textContent = state.day + "日目";
      ui.goldValue.textContent = state.gold + "G";
      ui.titleValue.textContent = state.title;
      ui.locationValue.textContent = scene.location;
      ui.statusLine.textContent = state.ended
        ? (state.win
            ? "社会復帰ゲージが最大に達し、面接戦を突破しました。"
            : "体力または気力が尽きました。再挑戦でルート最適化ができます。")
        : "日々の小さな行動が、魔王へのダメージに変わります。無理をしすぎず、進捗を積んでください。";
      ui.sceneTitle.textContent = scene.title;
      ui.sceneText.textContent = scene.text;

      renderBars();
      renderJournal();
      renderEnding();

      ui.choices.innerHTML = "";
      scene.options.forEach((option) => {
        ui.choices.appendChild(createChoice(option));
      });

      ui.metaActions.innerHTML = "";
      if (!state.ended) {
        ui.metaActions.appendChild(
          createMetaButton("気力を整える", "1 日休み、少し回復する安定行動。", () => {
            updateState({ day: 1, hp: 12, energy: 18, bossHp: 4 });
            addLog("休息を選択。進みは遅いが、崩れないことが明日につながる。");
            render();
          }, false)
        );
      } else {
        ui.metaActions.appendChild(createMetaButton("再挑戦する", "", resetGame, true));
      }
    }

    function resetGame() {
      state.day = 1;
      state.gold = 250;
      state.hp = 72;
      state.energy = 64;
      state.progress = 8;
      state.bossHp = maxStats.bossHp;
      state.scene = "room";
      state.title = "部屋の守護者";
      state.ended = false;
      state.win = false;
      state.log = [
        { day: 1, message: "目覚めた。まずは布団の外が最初のダンジョンだ。" }
      ];
      render();
    }

    ui.restartButton.addEventListener("click", resetGame);
    resetGame();
  </script>
</body>
</html>
